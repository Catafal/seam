# Seam MCP Tool Specifications (Phase 0)
# These are the "API contracts" for the MCP server.
# Implement exactly these signatures in seam/server/tools.py.

tools:

  seam_query:
    description: |
      Find all code related to a concept using hybrid search (FTS5 + 1-hop graph expansion).
      Use this when you need to find where a concept lives across the codebase.
    input:
      concept:
        type: string
        required: true
        description: Natural-language concept or keyword (e.g. "authentication", "rate limiting")
        min_length: 1
        max_length: 200
      limit:
        type: integer
        required: false
        default: 10
        min: 1
        max: 50
    output:
      type: array
      items:
        symbol:
          type: string
          description: Symbol name (may be Class.method format)
        file:
          type: string
          description: Relative path from project root
        line:
          type: integer
          description: Start line of the symbol definition
        score:
          type: number
          description: BM25 relevance score (higher = more relevant)
        callers_count:
          type: integer
          description: Number of known callers in the index
        callees_count:
          type: integer
          description: Number of known callees in the index
      empty_ok: true
      empty_message: "No results for '{concept}'"
    errors:
      - code: INVALID_INPUT
        condition: concept is empty string or whitespace-only

  seam_context:
    description: |
      Get a 360° view of a symbol: its callers, callees, file location, and docstring.
      Use before touching any existing function or class.
    input:
      symbol:
        type: string
        required: true
        description: Exact symbol name (e.g. "UserService", "authenticate_user", "UserService.validate")
        min_length: 1
        max_length: 200
    output:
      type: object
      nullable: true
      null_message: "Symbol '{symbol}' not found in index"
      fields:
        symbol:
          type: string
        file:
          type: string
          description: Relative path from project root
        line:
          type: integer
        end_line:
          type: integer
        kind:
          type: string
          enum: [function, class, method, interface, type]
        docstring:
          type: string
          nullable: true
        callers:
          type: array
          items: string
          description: Symbol names that call/import this symbol
        callees:
          type: array
          items: string
          description: Symbol names this symbol calls/imports
    errors:
      - code: INVALID_INPUT
        condition: symbol is empty string or whitespace-only

  seam_search:
    description: |
      Full-text search across all indexed symbol names and docstrings (FTS5 BM25).
      Use when you know a keyword but not the exact symbol name.
    input:
      text:
        type: string
        required: true
        description: Search query (supports FTS5 operators: AND, OR, NOT, phrase "in quotes")
        min_length: 1
        max_length: 500
      limit:
        type: integer
        required: false
        default: 20
        min: 1
        max: 100
    output:
      type: array
      items:
        symbol:
          type: string
        file:
          type: string
        line:
          type: integer
        snippet:
          type: string
          description: Highlighted excerpt from the matching content (FTS5 highlight())
        score:
          type: number
          description: BM25 rank score
      empty_ok: true
      empty_message: "No results for '{text}'"
    errors:
      - code: INVALID_INPUT
        condition: text is empty string or whitespace-only
      - code: INVALID_QUERY
        condition: FTS5 syntax error in text (malformed boolean operators)

# ── Phase 1 Tools ──────────────────────────────────────────────────────────────

  seam_impact:
    status: IMPLEMENTED
    description: |
      Blast-radius analysis — what breaks if I change this symbol?
      Returns all symbols that depend on the target (upstream), that the target
      depends on (downstream), or both — grouped into risk tiers by distance.
      Use before editing any symbol to understand the blast radius.
    input:
      target:
        type: string
        required: true
        description: Symbol name to analyze (e.g. "upsert_file", "UserService.validate")
        min_length: 1
        max_length: 200
      direction:
        type: string
        required: false
        default: "upstream"
        enum: [upstream, downstream, both]
        description: |
          upstream   = who depends on the target (callers/importers)
          downstream = what the target depends on (callees/importees)
          both       = full neighborhood (upstream + downstream)
      max_depth:
        type: integer
        required: false
        default: 3
        min: 1
        max: 10
        description: Maximum number of hops from the target. Clamped to [1, 10].
    output:
      type: object
      description: |
        Top-level keys always present:
          found:   bool — True if the target is known in the index; False if not found
                          (typo / not yet indexed). Use this to distinguish "not found"
                          from "found but no dependents".
          target:  str  — the queried symbol name (echoed back for agent convenience).

        Direction-keyed TierGroups (keys depend on direction):
          "upstream"   -> {"upstream": TierGroup}
          "downstream" -> {"downstream": TierGroup}
          "both"       -> {"upstream": TierGroup, "downstream": TierGroup}

        TierGroup always contains all three tier keys even if empty:
          WILL_BREAK       (distance 1)  — direct dependents, definitely affected
          LIKELY_AFFECTED  (distance 2)  — indirect dependents, probably affected
          MAY_NEED_TESTING (distance 3+) — transitive dependents, test to be sure

        Each entry in a tier:
          name:        symbol name (string)
          distance:    hops from the target (integer, 1-based)
          confidence:  EXTRACTED | INFERRED | AMBIGUOUS
                       (aggregated path confidence — weakest hop wins)
          tier:        risk tier name (string)
          file:        relative path from project root for indexed symbols;
                       null for names not in the symbols table (external deps, etc.)

        Unknown symbol: found=false, empty tier groups (not an error).
      empty_ok: true
      empty_message: "No dependents found for '{target}'"
    errors:
      - code: INVALID_INPUT
        condition: target is empty string or whitespace-only
      - code: INVALID_INPUT
        condition: direction is not one of upstream, downstream, both

  seam_changes:
    status: IMPLEMENTED
    description: |
      Pre-commit risk check — map git diff to affected symbols and produce an overall
      risk level. Diffs the working tree / staged set / branch against a git ref,
      maps each changed line range to the symbols it touched, runs impact analysis,
      and returns a risk level (low / medium / high / critical).
      Returns NOT_A_GIT_REPO when run outside a git repository.
    input:
      scope:
        type: string
        required: false
        default: "working"
        enum: [working, staged, branch]
        description: |
          working — unstaged working-tree changes (git diff)
          staged  — staged changes (git diff --cached)
          branch  — all changes on this branch vs base_ref (git diff <base_ref>...HEAD)
      base_ref:
        type: string
        required: false
        default: "main"
        description: |
          Git ref for scope=branch comparisons (e.g. "main", "origin/main", "v1.2").
          Ignored for scope=working and scope=staged.
    output:
      type: object
      fields:
        changed_symbols:
          type: array
          description: Symbols whose line ranges overlap changed lines.
          items:
            name:          symbol name (or "<module:file.py>" for module-level changes)
            file:          relative path from project root (or null)
            kind:          symbol kind (function | class | method | module | ...)
            start_line:    symbol definition start (0 for module-level synthetic entries)
            end_line:      symbol definition end (0 for module-level synthetic entries)
            changed_lines: list of new-file line numbers overlapping this symbol
        new_files:
          type: array
          items: string
          description: Relative paths of added or untracked files.
        affected:
          type: array
          description: Upstream dependents of changed symbols (from impact analysis).
          items:
            name:       symbol name
            file:       relative path from project root (null if not indexed)
            tier:       WILL_BREAK | LIKELY_AFFECTED | MAY_NEED_TESTING
            confidence: EXTRACTED | INFERRED | AMBIGUOUS
            distance:   hops from the nearest changed symbol
        risk_level:
          type: string
          enum: [low, medium, high, critical]
          description: |
            Rollup of the highest impact tier across all changed symbols:
              low      — no downstream dependents found
              medium   — MAY_NEED_TESTING (transitive dependents, d>=3)
              high     — LIKELY_AFFECTED (indirect dependents, d=2)
              critical — WILL_BREAK (direct dependents, d=1)
            Attenuated to "medium" when ALL affected symbols have AMBIGUOUS confidence
            (uncertain inputs cap the verdict confidence — see ChangeReport in CONTRACT.md).
        ambiguous_warning:
          type: boolean
          description: |
            True when ANY affected symbol has AMBIGUOUS edge confidence.
            Signals the risk estimate is uncertain; recommend manual review.
        scope:    the scope used (echoed back for agent convenience)
        base_ref: the base ref used (echoed back; only meaningful for scope=branch)
      empty_ok: true
      empty_message: "No changes detected for scope '{scope}'"
    errors:
      - code: INVALID_INPUT
        condition: scope is not one of working, staged, branch
      - code: INVALID_INPUT
        condition: base_ref is empty string or whitespace-only
      - code: NOT_A_GIT_REPO
        condition: root is not a git repository or git is not available

  seam_why:
    status: PHASE_2
    description: Return semantic comments (# WHY:, # HACK:, # NOTE:) near a file location.
