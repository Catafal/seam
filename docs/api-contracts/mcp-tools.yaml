# Seam MCP Tool Specifications (Phase 0)
# These are the "API contracts" for the MCP server.
# Implement exactly these signatures in seam/server/tools.py.

tools:

  seam_query:
    description: |
      Find all code related to a concept using hybrid search (FTS5 + 1-hop graph expansion).
      Use this when you need to find where a concept lives across the codebase.
    input:
      concept:
        type: string
        required: true
        description: Natural-language concept or keyword (e.g. "authentication", "rate limiting")
        min_length: 1
        max_length: 200
      limit:
        type: integer
        required: false
        default: 10
        min: 1
        max: 50
    output:
      type: array
      items:
        symbol:
          type: string
          description: Symbol name (may be Class.method format)
        file:
          type: string
          description: Relative path from project root
        line:
          type: integer
          description: Start line of the symbol definition
        score:
          type: number
          description: BM25 relevance score (higher = more relevant; includes Phase 4 signature-match boost)
        callers_count:
          type: integer
          description: Number of known callers in the index
        callees_count:
          type: integer
          description: Number of known callees in the index
        signature:
          type: string
          nullable: true
          description: |
            Phase 4. Declaration header normalized to one line; truncated to
            SEAM_MAX_SIGNATURE_LEN (default 300). null for pre-v5 rows.
        decorators:
          type: array
          items: string
          description: |
            Phase 4. Verbatim decorator strings (Python/TS). Always [] for Go/Rust
            and for pre-v5 rows.
        is_exported:
          type: boolean
          nullable: true
          description: Phase 4. See seam_context for full semantics. null for pre-v5 rows.
        visibility:
          type: string
          nullable: true
          description: Phase 4. See seam_context for full semantics. null for pre-v5 rows.
        qualified_name:
          type: string
          nullable: true
          description: Phase 4. Scope-resolved name. null for pre-v5 rows.
      empty_ok: true
      empty_message: "No results for '{concept}'"
    errors:
      - code: INVALID_INPUT
        condition: concept is empty string or whitespace-only

  seam_context:
    description: |
      Get a 360° view of a symbol: its callers, callees, file location, and docstring.
      Use before touching any existing function or class.
    input:
      symbol:
        type: string
        required: true
        description: Exact symbol name (e.g. "UserService", "authenticate_user", "UserService.validate")
        min_length: 1
        max_length: 200
    output:
      type: object
      nullable: true
      null_message: "Symbol '{symbol}' not found in index"
      fields:
        symbol:
          type: string
        file:
          type: string
          description: Relative path from project root
        line:
          type: integer
        end_line:
          type: integer
        kind:
          type: string
          enum: [function, class, method, interface, type]
        docstring:
          type: string
          nullable: true
        callers:
          type: array
          items: string
          description: Symbol names that call/import this symbol
        callees:
          type: array
          items: string
          description: Symbol names this symbol calls/imports
        ambiguous:
          type: boolean
          description: True when more than one symbol shares this name in the index (cross-file collision)
        cluster_id:
          type: integer
          nullable: true
          description: |
            Phase 2. Cluster this symbol belongs to; null when unclustered
            (below SEAM_CLUSTER_MIN_SIZE, no edges, or index predates Phase 2).
        cluster_label:
          type: string
          nullable: true
          description: |
            Phase 2. Human-readable label of the cluster (deterministic or LLM-generated);
            null when cluster_id is null.
        cluster_peers:
          type: array
          items: string
          description: |
            Phase 2. Names of other symbols in the same cluster (excluding this symbol).
            Empty list when unclustered or when the cluster has only one member.
        signature:
          type: string
          nullable: true
          description: |
            Phase 4. Declaration header normalized to a single line (e.g.
            "def parse(path: Path) -> Node | None"). Truncated to SEAM_MAX_SIGNATURE_LEN
            chars (default 300) with trailing "..." when truncated. null for pre-v5 rows
            or when the parser could not extract a header.
        decorators:
          type: array
          items: string
          description: |
            Phase 4. Verbatim decorator strings for Python (@dataclass) and TypeScript
            (@Injectable). Always [] for Go and Rust. Empty [] for pre-v5 rows.
        is_exported:
          type: boolean
          nullable: true
          description: |
            Phase 4. true when the symbol is part of the public API: TypeScript export
            keyword, Go capitalized name, Rust pub/pub(crate), Python no-underscore
            prefix heuristic. null when the language is unsupported or detection failed.
            null for pre-v5 rows.
        visibility:
          type: string
          nullable: true
          description: |
            Phase 4. "public" | "private" | "protected" (TS access modifier or Python
            underscore prefix) | "crate" (Rust pub(crate)). null when not applicable,
            unknown, or for pre-v5 rows. Treat null as "unknown", not as "private".
        qualified_name:
          type: string
          nullable: true
          description: |
            Phase 4. Scope-resolved name: "ClassName.method" for methods or plain name
            for top-level symbols. null when the outer scope could not be determined or
            for pre-v5 rows.
    errors:
      - code: INVALID_INPUT
        condition: symbol is empty string or whitespace-only

  seam_search:
    description: |
      Full-text search across all indexed symbol names and docstrings (FTS5 BM25).
      Use when you know a keyword but not the exact symbol name.
    input:
      text:
        type: string
        required: true
        description: Search query (supports FTS5 operators: AND, OR, NOT, phrase "in quotes")
        min_length: 1
        max_length: 500
      limit:
        type: integer
        required: false
        default: 20
        min: 1
        max: 100
    output:
      type: array
      items:
        symbol:
          type: string
        file:
          type: string
        line:
          type: integer
        snippet:
          type: string
          description: Highlighted excerpt from the matching content (FTS5 highlight())
        score:
          type: number
          description: BM25 rank score (includes Phase 4 signature-match boost of +15/term)
        signature:
          type: string
          nullable: true
          description: |
            Phase 4. Declaration header normalized to one line; truncated to
            SEAM_MAX_SIGNATURE_LEN (default 300). null for pre-v5 rows. Signature
            text is FTS-searchable — type-shaped queries match on param/return types.
        decorators:
          type: array
          items: string
          description: |
            Phase 4. Verbatim decorator strings (Python/TS). Always [] for Go/Rust
            and for pre-v5 rows.
        is_exported:
          type: boolean
          nullable: true
          description: Phase 4. See seam_context for full semantics. null for pre-v5 rows.
        visibility:
          type: string
          nullable: true
          description: Phase 4. See seam_context for full semantics. null for pre-v5 rows.
        qualified_name:
          type: string
          nullable: true
          description: Phase 4. Scope-resolved name. null for pre-v5 rows.
      empty_ok: true
      empty_message: "No results for '{text}'"
    errors:
      - code: INVALID_INPUT
        condition: text is empty string or whitespace-only
      - code: INVALID_QUERY
        condition: FTS5 syntax error in text (malformed boolean operators)

# ── Phase 1 Tools ──────────────────────────────────────────────────────────────

  seam_impact:
    status: IMPLEMENTED
    description: |
      Blast-radius analysis — what breaks if I change this symbol?
      Returns all symbols that depend on the target (upstream), that the target
      depends on (downstream), or both — grouped into risk tiers by distance.
      Use before editing any symbol to understand the blast radius.
    input:
      target:
        type: string
        required: true
        description: Symbol name to analyze (e.g. "upsert_file", "UserService.validate")
        min_length: 1
        max_length: 200
      direction:
        type: string
        required: false
        default: "upstream"
        enum: [upstream, downstream, both]
        description: |
          upstream   = who depends on the target (callers/importers)
          downstream = what the target depends on (callees/importees)
          both       = full neighborhood (upstream + downstream)
      max_depth:
        type: integer
        required: false
        default: 3
        min: 1
        max: 10
        description: Maximum number of hops from the target. Clamped to [1, 10].
      include_tests:
        type: boolean
        required: false
        default: true
        description: |
          When true (default), all dependents are returned — test-file entries included,
          each tagged with is_test=true. The default is unchanged from pre-#10 behavior.
          When false, dependents whose file lives in a test tree are filtered out from
          ALL tiers (WILL_BREAK / LIKELY_AFFECTED / MAY_NEED_TESTING). Entries with
          file=null (unresolved names) are always included regardless of this flag,
          because their provenance is unknown (is_test=false by rule).
          Set to false to see only the production blast radius — useful when test callers
          dominate the results. When false, the response also carries hidden_tests (int)
          so callers can distinguish "no dependents at all" from "all dependents were
          test files and got filtered" — the latter is NOT safe to treat as dead code.
    output:
      type: object
      description: |
        Top-level keys always present:
          found:   bool — True if the target is known in the index; False if not found
                          (typo / not yet indexed). Use this to distinguish "not found"
                          from "found but no dependents".
          target:  str  — the queried symbol name (echoed back for agent convenience).

        Direction-keyed TierGroups (keys depend on direction):
          "upstream"   -> {"upstream": TierGroup}
          "downstream" -> {"downstream": TierGroup}
          "both"       -> {"upstream": TierGroup, "downstream": TierGroup}

        TierGroup always contains all three tier keys even if empty:
          WILL_BREAK       (distance 1)  — direct dependents, definitely affected
          LIKELY_AFFECTED  (distance 2)  — indirect dependents, probably affected
          MAY_NEED_TESTING (distance 3+) — transitive dependents, test to be sure

        Each entry in a tier:
          name:        symbol name (string)
          distance:    hops from the target (integer, 1-based)
          confidence:  EXTRACTED | INFERRED | AMBIGUOUS
                       (aggregated path confidence — weakest hop wins)
                       Resolved at read time against the whole index:
                         EXTRACTED = target name is unique in the full index
                         AMBIGUOUS = target name shared by >1 indexed symbol
                         INFERRED  = target not indexed (external, stdlib, dynamic)
          tier:        risk tier name (string)
          file:        relative path from project root for indexed symbols;
                       null for names not in the symbols table (external deps, etc.)
          is_test:     bool — True if the entry's file is a test file (per path heuristic);
                       False for production files AND for entries with file=null
                       (unresolved names are never labelled as test, to avoid false positives).

        Present only when include_tests=false:
          hidden_tests: int — count of test-file dependents that were filtered out across
                              all tiers. Distinguishes "no dependents" (hidden_tests==0)
                              from "all dependents were test files, all hidden" (hidden_tests>0).
                              The latter is NOT safe to treat as dead code — tests would break.

        Unknown symbol: found=false, empty tier groups (not an error).
      empty_ok: true
      empty_message: "No dependents found for '{target}'"
    errors:
      - code: INVALID_INPUT
        condition: target is empty string or whitespace-only
      - code: INVALID_INPUT
        condition: direction is not one of upstream, downstream, both

  seam_trace:
    status: IMPLEMENTED
    description: |
      Trace the call/dependency path between two symbols.
      Returns the shortest path from source to target as an ordered list of hops,
      where each hop carries the edge kind (call | import) and per-edge confidence
      (EXTRACTED | INFERRED | AMBIGUOUS).

      Also returns one-hop callers and callees for both symbols so the agent can
      see the immediate neighborhood alongside the path.

      Use when you need to understand how control flows from one symbol to another,
      or to answer "how does X reach Y?" without manual grep.

      Returns found=false (paths=[]) when no path exists — a real, distinguishable
      "not connected" answer. Per-hop confidence lets you flag any hop that rests on
      an AMBIGUOUS edge (name collision at extraction time).
    input:
      source:
        type: string
        required: true
        description: Starting symbol name (e.g. "init", "parse_file")
        min_length: 1
        max_length: 200
      target:
        type: string
        required: true
        description: Destination symbol name (e.g. "upsert_file", "init_db")
        min_length: 1
        max_length: 200
      max_depth:
        type: integer
        required: false
        default: 10
        min: 1
        max: 10
        description: Maximum number of hops. Clamped to [1, 10].
    output:
      type: object
      description: |
        Top-level keys always present:
          found       (bool)  — True if a path was found; False if source and target
                                are not connected within max_depth hops.
          source      (str)   — queried source name (echoed back).
          target      (str)   — queried target name (echoed back).
          paths       (list)  — list of paths; each path is list[Hop].
                                Empty list ([]) when not connected.
          callers_source (list) — one-hop callers of source (list[EdgeHop]).
          callees_source (list) — one-hop callees of source (list[EdgeHop]).
          callers_target (list) — one-hop callers of target (list[EdgeHop]).
          callees_target (list) — one-hop callees of target (list[EdgeHop]).

        Hop shape (per edge in a path):
          from_name   (str) — source of this edge
          to_name     (str) — target of this edge
          kind        (str) — 'call' | 'import'
          confidence  (str) — EXTRACTED | INFERRED | AMBIGUOUS
                              Resolved at read time against the whole index
                              (EXTRACTED = to_name unique in index; AMBIGUOUS = shared name;
                               INFERRED = to_name not indexed)

        EdgeHop shape (for callers_* / callees_* lists):
          name        (str) — neighboring symbol name
          kind        (str) — 'call' | 'import'
          confidence  (str) — EXTRACTED | INFERRED | AMBIGUOUS

        Special case: source == target → found=true, paths=[[]] (empty inner path,
        zero hops, trivially connected to itself).
      empty_ok: true
      empty_message: "No path found from '{source}' to '{target}'"
    errors:
      - code: INVALID_INPUT
        condition: source is empty string or whitespace-only
      - code: INVALID_INPUT
        condition: target is empty string or whitespace-only

  seam_changes:
    status: IMPLEMENTED
    description: |
      Pre-commit risk check — map git diff to affected symbols and produce an overall
      risk level. Diffs the working tree / staged set / branch against a git ref,
      maps each changed line range to the symbols it touched, runs impact analysis,
      and returns a risk level (low / medium / high / critical).
      Returns NOT_A_GIT_REPO when run outside a git repository.
    input:
      scope:
        type: string
        required: false
        default: "working"
        enum: [working, staged, branch]
        description: |
          working — unstaged working-tree changes (git diff)
          staged  — staged changes (git diff --cached)
          branch  — all changes on this branch vs base_ref (git diff <base_ref>...HEAD)
      base_ref:
        type: string
        required: false
        default: "main"
        description: |
          Git ref for scope=branch comparisons (e.g. "main", "origin/main", "v1.2").
          Ignored for scope=working and scope=staged.
    output:
      type: object
      fields:
        changed_symbols:
          type: array
          description: Symbols whose line ranges overlap changed lines.
          items:
            name:          symbol name (or "<module:file.py>" for module-level changes)
            file:          relative path from project root (or null)
            kind:          symbol kind (function | class | method | module | ...)
            start_line:    symbol definition start (0 for module-level synthetic entries)
            end_line:      symbol definition end (0 for module-level synthetic entries)
            changed_lines: list of new-file line numbers overlapping this symbol
        new_files:
          type: array
          items: string
          description: Relative paths of added or untracked files.
        affected:
          type: array
          description: Upstream dependents of changed symbols (from impact analysis).
          items:
            name:       symbol name
            file:       relative path from project root (null if not indexed)
            tier:       WILL_BREAK | LIKELY_AFFECTED | MAY_NEED_TESTING
            confidence: EXTRACTED | INFERRED | AMBIGUOUS
                        Resolved at read time against the whole index.
                        EXTRACTED = target unique; AMBIGUOUS = shared name; INFERRED = not indexed.
            distance:   hops from the nearest changed symbol
        risk_level:
          type: string
          enum: [low, medium, high, critical]
          description: |
            Rollup of the highest impact tier across all changed symbols:
              low      — no downstream dependents found
              medium   — MAY_NEED_TESTING (transitive dependents, d>=3)
              high     — LIKELY_AFFECTED (indirect dependents, d=2)
              critical — WILL_BREAK (direct dependents, d=1)
            Attenuated to "medium" when ALL affected symbols have AMBIGUOUS confidence
            (uncertain inputs cap the verdict confidence — see ChangeReport in CONTRACT.md).
        ambiguous_warning:
          type: boolean
          description: |
            True when ANY affected symbol has AMBIGUOUS edge confidence.
            Signals the risk estimate is uncertain; recommend manual review.
        partial:
          type: boolean
          description: |
            True when the number of real changed symbols (excluding synthetic <module:...>
            and <new:...> entries) exceeded the SEAM_MAX_IMPACT_SYMBOLS cap (default 50),
            so the risk verdict was computed on only the first N changed symbols.
            False on normal-sized diffs where all changed symbols were analyzed.
            When true, treat the risk_level as a lower bound — the full blast radius may
            be larger. The cap can be raised via the SEAM_MAX_IMPACT_SYMBOLS env var.
        scope:    the scope used (echoed back for agent convenience)
        base_ref: the base ref used (echoed back; only meaningful for scope=branch)
      empty_ok: true
      empty_message: "No changes detected for scope '{scope}'"
    errors:
      - code: INVALID_INPUT
        condition: scope is not one of working, staged, branch
      - code: INVALID_INPUT
        condition: base_ref is empty string or whitespace-only
      - code: NOT_A_GIT_REPO
        condition: root is not a git repository or git is not available

  seam_clusters:
    status: IMPLEMENTED
    phase: 2
    description: |
      List all code clusters (functional areas) or the members of one cluster.

      Clusters are computed during `seam init` using Louvain community detection over
      the call/import graph. Each cluster represents a cohesive group of symbols that
      frequently call or import each other.

      With no argument: returns [{id, label, size}] — an overview of all detected
      functional areas sorted by id.

      With cluster_id: returns [{name, file, line, kind}] — all symbols in that
      cluster, with file paths relativized to the project root.

      Returns an empty list (not an error) when the index has no cluster data —
      either no symbols are indexed, `seam init` has not been run since Phase 2
      migration, or all communities fell below SEAM_CLUSTER_MIN_SIZE.
    input:
      cluster_id:
        type: integer
        required: false
        nullable: true
        default: null
        description: |
          When omitted (or null): list all clusters as [{id, label, size}].
          When provided: list member symbols of that cluster as [{name, file, line, kind}].
    output:
      type: array
      description: |
        No cluster_id → list of cluster summaries:
          id:     (int)    — stable cluster identifier (1-based, deterministic across re-index)
          label:  (str)    — human-readable label (deterministic or LLM-generated)
          size:   (int)    — number of member symbol ROWS (may exceed unique names due to
                             cross-file homonym collapse — see ADR-007)

        With cluster_id → list of member symbols:
          name:   (str)    — symbol name
          file:   (str)    — path relative to project root
          line:   (int)    — start line of the symbol definition
          kind:   (str)    — function | class | method | interface | type
      empty_ok: true
      empty_message: "No clusters found — run 'seam init' to compute clusters"
    errors: []

  seam_affected:
    status: IMPLEMENTED
    phase: 3
    description: |
      Find which test files are impacted by a set of changed source files.

      Given a list of changed file paths, traverses the reverse-dependency graph
      (upstream impact) to find all test files that depend on symbols in those files.
      Reuses the same traversal engine as seam_impact(direction="upstream") — no
      duplicate blast-radius logic.

      A changed file that is itself a test file is always included in affected_tests
      directly (you edited the test, you should run it).
      Files not in the index are silently skipped — they have no graph dependents.

      Typical agent workflow:
        1. git diff --name-only             → list of changed files
        2. seam_affected(changed_files)     → impacted test files
        3. pytest <affected_tests>          → run only what matters

      Returns INVALID_INPUT when changed_files is empty or exceeds SEAM_MAX_AFFECTED_FILES.
    input:
      changed_files:
        type: array
        items: string
        required: true
        description: |
          List of file paths (absolute, or relative to the project root).
          Must not be empty. Maximum length: SEAM_MAX_AFFECTED_FILES (default 200).
          Paths not present in the index are silently skipped (no error).
      depth:
        type: integer
        required: false
        default: 5
        description: |
          Maximum upstream traversal depth (hops) from each changed symbol.
          Default: SEAM_AFFECTED_DEPTH env var (default 5).
          Higher values find more distant test dependents but increase runtime on
          large graphs. depth=0 returns only directly-changed test files (no traversal).
    output:
      type: object
      description: |
        changed_files:
          (list[str]) — relativized paths of the input changed files (relative to project root).
        affected_tests:
          (list[str]) — sorted unique test-file paths (relative to project root) that must be
                        re-run. Empty list when no test dependents are found.
        total_dependents_traversed:
          (int) — total number of dependent entries examined across all symbols in all changed
                  files. Informational; may double-count when the same dependent is reachable
                  from multiple changed symbols.
        partial:
          (bool) — True when the per-file symbol cap (SEAM_MAX_AFFECTED_SYMBOLS, default 50)
                   was hit for at least one file. When true, the affected set may be incomplete.
                   Raise SEAM_MAX_AFFECTED_SYMBOLS via env var to analyze more symbols per file.
      empty_ok: true
      empty_message: "No affected test files found for the given changed files"
    errors:
      - code: INVALID_INPUT
        condition: changed_files is empty
      - code: INVALID_INPUT
        condition: len(changed_files) exceeds SEAM_MAX_AFFECTED_FILES (default 200)

  seam_why:
    status: IMPLEMENTED
    phase: 1b
    description: |
      Return semantic comments (WHY/HACK/NOTE/TODO/FIXME) near a file location or a symbol.
      Comments are extracted at index time from Python # line comments and TypeScript //
      and /* */ block comments. Only marker-tagged comments are stored — plain comments
      are ignored, so an empty result genuinely means "no recorded rationale here."

      Lookup modes (at least one of file or symbol is required):
        file only     — all semantic comments in that file.
        file + line   — comments within ±15 lines of that line number (RADIUS=15).
        symbol        — comments in [start_line - 5, end_line] of the resolved symbol
                        (LEAD=5 captures pre-symbol rationale comments just above the def).

      Marker set (fixed; matched case-insensitively, optional trailing colon):
        WHY, HACK, NOTE, TODO, FIXME
      Matching rule: marker must be followed by ':', whitespace, or end-of-string so
      partial words like 'whyever' or 'notes' do NOT produce a false match.
      Stored marker is normalized to UPPERCASE.
    input:
      file:
        type: string
        required: false
        description: |
          File path (relative to project root or absolute). At least one of
          file or symbol must be supplied — omitting both is INVALID_INPUT.
      line:
        type: integer
        required: false
        description: |
          1-based line number. Only meaningful when file is also provided.
          When supplied, returns comments within ±RADIUS (15) lines of this line.
          Ignored when symbol is given (symbol mode uses the symbol's own line range).
      symbol:
        type: string
        required: false
        description: |
          Symbol name to look up (e.g. "my_func", "UserService.validate"). When
          multiple symbols share the name, the first by (file path, symbol id) is used —
          deterministic, matching seam_context behaviour. At least one of file or
          symbol must be supplied.
    output:
      type: array
      items:
        file:
          type: string
          description: Relative path from project root (consistent with other tools).
        line:
          type: integer
          description: 1-based line number of the comment in the source file.
        marker:
          type: string
          enum: [WHY, HACK, NOTE, TODO, FIXME]
          description: Normalized UPPERCASE marker keyword.
        text:
          type: string
          description: Comment body after the marker (and optional colon), stripped.
      empty_ok: true
      empty_message: "No semantic comments found for the given location or symbol."
    errors:
      - code: INVALID_INPUT
        condition: neither file nor symbol is provided
