# Seam MCP Tool Specifications (Phase 0)
# These are the "API contracts" for the MCP server.
# Implement exactly these signatures in seam/server/tools.py.
#
# MCP error/not-found contract (normalized in seam/server/mcp.py::_finalize):
#   - Validation/runtime errors (the `errors:` blocks below) surface to the agent as an
#     MCP tool error: isError=True with content text "<CODE>: <message>". (The handler
#     returns {"error","message"}; the MCP boundary RAISES so FastMCP sets isError — a
#     returned dict would leave isError=False, which an agent reads as success.)
#   - "Not found" (handler null) is normalized to {"found": false} — structured, isError=False.
#   - The CLI exposes the SAME code+message via its own envelope {"ok":false,"error":{...}}.
#
# Edge synthesis (edge-synthesis phase): a whole-graph post-pass writes synthesized edges
# (kind='call', confidence='INFERRED', tagged in the v12 edges.synthesized_by column —
# NULL = statically extracted, a channel-name string = synthesized). Because the read-path
# traversal is KIND-AGNOSTIC, seam_impact / seam_context / seam_trace traverse synthesized
# edges automatically (exactly like 'holds' edges) — an interface-method change surfaces all
# implementations; an event-bus / closure-collection dispatch surfaces its handlers. NO new
# tool is added — count stays 12.
#
# E4 edge provenance (closed follow-up): synthesized_by is now surfaced in seam_impact tier
# entries and seam_trace hops when SEAM_EDGE_PROVENANCE=on (default). Edge kind vocabulary
# is now 9: call | import | extends | implements | instantiates | holds | reads | writes | uses
# Each seam_impact entry carries 'kind' (final hop's edge kind; always kept incl. lean mode)
# and 'synthesized_by' (channel name or null; stripped in lean mode like resolved_by).
# Each seam_trace hop carries 'synthesized_by' in addition to the existing 'kind'.
# SEAM_EDGE_PROVENANCE=off = byte-identical pre-E4 output (neither field emitted).
#
# E4 truncation steer: seam_impact carries a top-level 'next_actions: list[str]' of
# ready-to-act hints when >=1 entry was trimmed (ABSENT when nothing was trimmed).
# Generated by pure leaf seam/analysis/steer.py; stays within max_bytes.
# SEAM_IMPACT_STEER=off = no next_actions key ever.
#
# P2 index staleness banner: seam_impact / seam_changes / seam_affected / seam_context /
# seam_trace each attach a top-level 'index_status' = {stale: true, reason: str, hint: str}
# when the index is stale, ABSENT when fresh (presence = stale signal). Gated by
# SEAM_STALENESS_CHECK (default on; off = byte-identical pre-P2). All existing fields in
# each tool's response are byte-identical to pre-P2 — the banner is purely additive.
# seam_changes/seam_affected risk verdicts remain byte-stable regardless of this knob
# (their analysis layers are called directly below the handler boundary).
# Implemented in seam/analysis/staleness.py (check_staleness) +
# seam/server/handler_common.py (_maybe_attach_staleness).
#
# A3 field-access edges: extraction-time, per-file, watcher-compatible. New edge kinds
# 'reads' (field read) and 'writes' (field write/delete). Edge kind vocabulary (pre-E4 was 8,
# post-E4 adds 'uses' = 9): call | import | extends | implements | instantiates | holds |
# reads | writes | uses. symbols.kind gains 'field' (qualified_name='Type.field'). All
# reads/writes edges carry confidence='INFERRED'. Because traversal is KIND-AGNOSTIC,
# seam_impact / seam_trace / seam_context pick them up automatically. seam_context
# additionally returns field_readers and field_writers lists (typed split of the inclusive
# callers BFS). Controlled by SEAM_FIELD_ACCESS_EDGES (default on; extraction-time; seam
# init re-index required). NO new tool — count stays 12.

tools:

  seam_schema:
    status: IMPLEMENTED
    phase: phase-11-p1-1
    description: |
      Read-only index capability and schema introspection.

      This is the cheapest first call for an agent entering an unfamiliar Seam index.
      It reports the index schema version, Seam version, freshness, population counts,
      optional capability flags, grouped count breakdowns, warnings, and tool guidance.
      With verbose=true it also includes table/column metadata for diagnostics.

      The handler never mutates the DB and does not require source-file reads beyond
      the existing staleness check. Missing optional tables degrade into counts=false
      capabilities plus structured warnings instead of hard failures.
    input:
      verbose:
        type: bool
        default: false
        description: Include table and column metadata for diagnostics.
    output:
      type: object
      description: |
        schema_version:
          (int | str) — metadata.schema_version when present; "0" fallback coerced to int.
        seam_version:
          (str) — installed Seam package version.
        index_seam_version:
          (str | null) — metadata.seam_version when present.
        freshness:
          (object) — stale bool plus reason/hint from the shared staleness checker.
        counts:
          (object) — files, symbols, edges, clusters, comments, import_mappings, embeddings.
        breakdowns:
          (object) — grouped maps for languages, symbol_kinds, edge_kinds,
          edge_confidence, synthesized_edges, comment_markers, embedding_models.
        capabilities:
          (object) — derived booleans for optional features and important columns:
          has_clusters, has_comments, has_import_mappings, has_embeddings,
          embedding_model_matches, has_synthesized_edges, has_field_symbols,
          has_receiver_column, has_search_text, has_signature_column,
          has_synthesized_by_column.
        tools:
          (list) — read-only tool guide entries with transports, dependencies, and use_when.
        recommended_next_calls:
          (list[str]) — agent-ready next-call guidance.
        warnings:
          (list) — structured {code, message, hint}; includes stale, empty index,
          missing optional tables, no clusters, no embeddings, and embedding model mismatch.
        tables:
          (object | null) — present only when verbose=true; table existence and column metadata.
      found_false_ok: false
    errors:
      - NO_INDEX
      - DB_ERROR

  seam_query:
    description: |
      Find all code related to a concept using hybrid search (FTS5 + 1-hop graph expansion).
      Use this when you need to find where a concept lives across the codebase.

      Semantic hybrid (Semantic phase): when SEAM_SEMANTIC=on AND the embeddings table has
      rows for the configured model, semantic candidates (cosine similarity via fastembed) are
      merged with FTS5 candidates via Reciprocal Rank Fusion (RRF, k=60). The merged set then
      flows through the existing 1-hop expansion and callers/callees enrichment pipeline.
      Semantic symbols appear as seeds at score=0.5 (above graph neighbors at 0.0, below FTS
      rescored seeds). When disabled or unavailable (SEAM_SEMANTIC=off, no embeddings, model
      mismatch), behavior is byte-identical to pre-Semantic (pure FTS5 path).

      No new tool is added — tool count stays 11. Pass semantic=false to force keyword-only.

      Tier A name-resolution: the 1-hop graph expansion uses the same qualified<->bare
      bridging as seam_context. When a FTS seed is a class/interface/struct, its callers
      include callers of all member methods (edge_match_names fan-out). When a seed is a
      qualified method ("Class.method"), callers stored under the bare form are included.
      This improves recall for method-level and class-level concept queries with no
      change to the tool interface.
    input:
      concept:
        type: string
        required: true
        description: Natural-language concept or keyword (e.g. "authentication", "rate limiting")
        min_length: 1
        max_length: 200
      limit:
        type: integer
        required: false
        default: 10
        min: 1
        max: 50
      semantic:
        type: boolean
        required: false
        default: true
        description: |
          When true (default): use hybrid FTS5+semantic path if SEAM_SEMANTIC=on and
          embeddings are present. When false: force keyword-only FTS5 regardless of config.
          Useful for comparing keyword vs. hybrid results without changing env vars.
    output:
      type: array
      items:
        symbol:
          type: string
          description: Symbol name (may be Class.method format)
        uid:
          type: string
          description: |
            P6c. Stable opaque handle for this exact symbol: sha1(abs_file)[:8] + ':' + line.
            Pass it back as the `uid` argument to seam_context/seam_impact/seam_trace to pin
            THIS homonym (the exact file+line) without a disambiguation round-trip. Computed
            from the absolute path before relativization; no schema change, no extra DB query.
        file:
          type: string
          description: Relative path from project root
        line:
          type: integer
          description: Start line of the symbol definition
        score:
          type: number
          description: BM25 relevance score (higher = more relevant; includes Phase 4 signature-match boost)
        callers_count:
          type: integer
          description: Number of known callers in the index
        callees_count:
          type: integer
          description: Number of known callees in the index
        signature:
          type: string
          nullable: true
          description: |
            Phase 4. Declaration header normalized to one line; truncated to
            SEAM_MAX_SIGNATURE_LEN (default 300). null for pre-v5 rows.
        decorators:
          type: array
          items: string
          description: |
            Phase 4. Verbatim decorator strings (Python/TS). Always [] for Go/Rust
            and for pre-v5 rows.
        is_exported:
          type: boolean
          nullable: true
          description: Phase 4. See seam_context for full semantics. null for pre-v5 rows.
        visibility:
          type: string
          nullable: true
          description: Phase 4. See seam_context for full semantics. null for pre-v5 rows.
        qualified_name:
          type: string
          nullable: true
          description: Phase 4. Scope-resolved name. null for pre-v5 rows.
      empty_ok: true
      empty_message: "No results for '{concept}'"
    errors:
      - code: INVALID_INPUT
        condition: concept is empty string or whitespace-only

  seam_context:
    description: |
      Get a 360° view of a symbol: its callers, callees, file location, and docstring.
      Use before touching any existing function or class.

      Tier A name-resolution: seam_context bridges the qualified<->bare name asymmetry
      stored in the index. You may pass:
        - A qualified name:  "Parser.parse"  → looks up the exact symbol; also matches
          call edges stored under the bare form "parse". Callers that call the bare
          identifier are included.
        - A bare name:       "parse"         → if no symbol with that exact name exists,
          resolves to ALL qualified defs ending ".parse" (e.g. "Parser.parse",
          "Lexer.parse") and merges their callers/callees. `ambiguous` is true when
          more than one definition was found and merged.
        - A class name:      "Parser"        → includes callers of ALL of Parser's
          methods by fanning out to member bare names in the edge lookup.
          Bounded by SEAM_NAME_EXPANSION_CAP (default 50).
      `ambiguous: true` means the result is a merged view across multiple definitions.
      Use a qualified name or the `uid` field from seam_search/seam_query to pin one.
    input:
      symbol:
        type: string
        required: false
        description: Exact symbol name (e.g. "UserService", "authenticate_user", "UserService.validate")
        min_length: 1
        max_length: 200
      uid:
        type: string
        required: false
        nullable: true
        default: null
        description: |
          P6c. A stable handle (from a seam_search/seam_query result `uid` field) that pins
          the EXACT (file, line) symbol — an alternative to `symbol` that bypasses homonym
          ambiguity and saves the disambiguation round-trip. When given, `symbol` is ignored.
          An unknown/stale uid returns null (same not-found contract as an unknown name).
    output:
      type: object
      nullable: true
      null_message: "Symbol '{symbol}' not found in index"
      fields:
        symbol:
          type: string
        file:
          type: string
          description: Relative path from project root
        line:
          type: integer
        end_line:
          type: integer
        kind:
          type: string
          enum: [function, class, method, interface, type, field]
          description: |
            'field' is new in A3 — first-class indexed field/property symbol
            (qualified_name='Type.field'). Tooling that treats kind as a closed enum must
            handle 'field'. All other kinds are unchanged.
        docstring:
          type: string
          nullable: true
        callers:
          type: array
          items: string
          description: Symbol names that call/import this symbol
        callees:
          type: array
          items: string
          description: Symbol names this symbol calls/imports
        ambiguous:
          type: boolean
          description: True when more than one symbol shares this name in the index (cross-file collision)
        cluster_id:
          type: integer
          nullable: true
          description: |
            Phase 2. Cluster this symbol belongs to; null when unclustered
            (below SEAM_CLUSTER_MIN_SIZE, no edges, or index predates Phase 2).
        cluster_label:
          type: string
          nullable: true
          description: |
            Phase 2. Human-readable label of the cluster (deterministic or LLM-generated);
            null when cluster_id is null.
        cluster_peers:
          type: array
          items: string
          description: |
            Phase 2. Names of other symbols in the same cluster (excluding this symbol).
            Empty list when unclustered or when the cluster has only one member.
        signature:
          type: string
          nullable: true
          description: |
            Phase 4. Declaration header normalized to a single line (e.g.
            "def parse(path: Path) -> Node | None"). Truncated to SEAM_MAX_SIGNATURE_LEN
            chars (default 300) with trailing "..." when truncated. null for pre-v5 rows
            or when the parser could not extract a header.
        decorators:
          type: array
          items: string
          description: |
            Phase 4. Verbatim decorator strings for Python (@dataclass) and TypeScript
            (@Injectable). Always [] for Go and Rust. Empty [] for pre-v5 rows.
        is_exported:
          type: boolean
          nullable: true
          description: |
            Phase 4. true when the symbol is part of the public API: TypeScript export
            keyword, Go capitalized name, Rust pub/pub(crate), Python no-underscore
            prefix heuristic. null when the language is unsupported or detection failed.
            null for pre-v5 rows.
        visibility:
          type: string
          nullable: true
          description: |
            Phase 4. "public" | "private" | "protected" (TS access modifier or Python
            underscore prefix) | "crate" (Rust pub(crate)). null when not applicable,
            unknown, or for pre-v5 rows. Treat null as "unknown", not as "private".
        qualified_name:
          type: string
          nullable: true
          description: |
            Phase 4. Scope-resolved name: "ClassName.method" for methods or plain name
            for top-level symbols. null when the outer scope could not be determined or
            for pre-v5 rows.
        field_readers:
          type: array
          items: string
          description: |
            A3. Symbol names that have a 'reads' edge pointing to this symbol —
            i.e., symbols that read this field/property. Empty list when no reads
            edges exist (either pre-A3 index, SEAM_FIELD_ACCESS_EDGES=off, or this
            symbol has no recorded field readers). Distinct from 'callers': callers
            uses the kind-agnostic BFS (all edge kinds); field_readers is the precise
            typed split for reads edges only.
        field_writers:
          type: array
          items: string
          description: |
            A3. Symbol names that have a 'writes' edge pointing to this symbol —
            i.e., symbols that write or delete this field/property. Empty list when
            no writes edges exist. Same distinction from 'callers' as field_readers.
        index_status:
          type: object
          nullable: true
          description: |
            P2. Present ONLY when SEAM_STALENESS_CHECK=on AND the index is stale.
            ABSENT when fresh — presence is the unambiguous stale signal.
            Fields: stale (bool, always true when present), reason (str, human-readable
            cause), hint (str, the specific remedy command). All other context fields
            are byte-identical to pre-P2; this key is purely additive.
            Same contract as seam_impact.index_status.
    errors:
      - code: INVALID_INPUT
        condition: symbol is empty string or whitespace-only

  seam_search:
    description: |
      Full-text search across all indexed symbol names and docstrings (FTS5 BM25).
      Use when you know a keyword but not the exact symbol name.

      Semantic hybrid (Semantic phase): when SEAM_SEMANTIC=on AND the embeddings table has
      rows for the configured model, semantic candidates (cosine similarity via fastembed) are
      merged with FTS5 candidates via Reciprocal Rank Fusion (RRF, k=60). The merged result
      is ranked by RRF score (1/(k+rank)). FTS snippets (BM25 highlighted excerpts) are
      preserved for FTS hits; semantic-only hits get snippet="". Semantic ONLY ADDS recall —
      a keyword hit is never dropped from the merged result. When disabled or unavailable
      (SEAM_SEMANTIC=off, no embeddings, model mismatch), behavior is byte-identical to
      pre-Semantic (pure FTS5 path, including the LIKE and fuzzy fallbacks).

      No new tool is added — tool count stays 11. Pass semantic=false to force keyword-only.
    input:
      text:
        type: string
        required: true
        description: Search query (supports FTS5 operators: AND, OR, NOT, phrase "in quotes")
        min_length: 1
        max_length: 500
      limit:
        type: integer
        required: false
        default: 20
        min: 1
        max: 100
      semantic:
        type: boolean
        required: false
        default: true
        description: |
          When true (default): use hybrid FTS5+semantic path if SEAM_SEMANTIC=on and
          embeddings are present. When false: force keyword-only FTS5 regardless of config.
          Useful for comparing keyword vs. hybrid results without changing env vars.
    output:
      type: array
      items:
        symbol:
          type: string
        uid:
          type: string
          description: |
            P6c. Stable opaque handle for this exact symbol: sha1(abs_file)[:8] + ':' + line.
            Pass it back as the `uid` argument to seam_context/seam_impact/seam_trace to pin
            THIS homonym without a disambiguation round-trip. See seam_query.uid.
        file:
          type: string
        line:
          type: integer
        snippet:
          type: string
          description: Highlighted excerpt from the matching content (FTS5 highlight())
        score:
          type: number
          description: BM25 rank score (includes Phase 4 signature-match boost of +15/term)
        signature:
          type: string
          nullable: true
          description: |
            Phase 4. Declaration header normalized to one line; truncated to
            SEAM_MAX_SIGNATURE_LEN (default 300). null for pre-v5 rows. Signature
            text is FTS-searchable — type-shaped queries match on param/return types.
        decorators:
          type: array
          items: string
          description: |
            Phase 4. Verbatim decorator strings (Python/TS). Always [] for Go/Rust
            and for pre-v5 rows.
        is_exported:
          type: boolean
          nullable: true
          description: Phase 4. See seam_context for full semantics. null for pre-v5 rows.
        visibility:
          type: string
          nullable: true
          description: Phase 4. See seam_context for full semantics. null for pre-v5 rows.
        qualified_name:
          type: string
          nullable: true
          description: Phase 4. Scope-resolved name. null for pre-v5 rows.
      empty_ok: true
      empty_message: "No results for '{text}'"
    errors:
      - code: INVALID_INPUT
        condition: text is empty string or whitespace-only
      - code: INVALID_QUERY
        condition: FTS5 syntax error in text (malformed boolean operators)

# ── Phase 1 Tools ──────────────────────────────────────────────────────────────

  seam_impact:
    status: IMPLEMENTED
    description: |
      Blast-radius analysis — what breaks if I change this symbol?
      Returns all symbols that depend on the target (upstream), that the target
      depends on (downstream), or both — grouped into risk tiers by distance.
      Use before editing any symbol to understand the blast radius.

      P6a — class inheritance is part of the dependency graph: a subclass→base
      'extends' edge and a class→interface 'implements' edge are traversed like
      call/import edges, so changing a base class or interface surfaces its
      subclasses/implementers upstream. Set SEAM_INHERITANCE_EDGES=off to omit
      inheritance edges (byte-identical to pre-P6a).

      Composition edges: 'holds' edges capture class composition — a class that
      stores another user-defined type as a typed field/property or typed
      constructor parameter emits a holds edge. Changing a held type (e.g.
      renaming a field type or altering its constructor) will surface the owning
      class in the upstream blast radius at d=1. Controlled by
      SEAM_COMPOSITION_EDGES (default on). Requires seam init re-index to appear.
      No new tool; traversed automatically alongside call/import/extends/implements/
      instantiates.

      A3 field-access edges: 'reads' and 'writes' edges capture data-flow through
      fields and properties (all 12 languages, extraction-time, watcher-compatible).
      A field reader or writer appears in the blast radius of the field symbol at d=1.
      symbols.kind gains 'field' (qualified_name='Type.field'). Controlled by
      SEAM_FIELD_ACCESS_EDGES (default on). Requires seam init re-index to appear.
      No new tool; traversed automatically (kind-agnostic BFS). E4: reads/writes
      provenance is now surfaced via the 'kind' field on each impact entry (see E4
      edge provenance below).

      Tier B edge enrichment: edges whose receiver type was confidently inferred
      at index time already carry a qualified 'Type.method' target in the DB —
      these resolve with EXTRACTED confidence when the name is unique. The
      'instantiates' edge kind (new Foo(), Foo{}, composite literals) is now
      traversed exactly like 'call': if you change Foo, all sites that call
      'new Foo()' appear in the blast radius. Edges with receiver=NULL (bare
      calls, imports, pre-v10 rows) degrade to Tier A read-time bridging as before.

      Tier A name-resolution: the BFS walk seeds are expanded before traversal:
        - Qualified name ("Parser.parse"): seeds are ["Parser.parse", "parse"].
          Upstream callers that stored the bare "parse" target are found.
        - Class name ("Parser"): seeds are ["Parser"] + all member bare names
          (e.g. ["Parser", "parse", "validate"]). Upstream callers of any method
          of the class are included. Bounded by SEAM_NAME_EXPANSION_CAP (default 50).
        - Bare non-container name ("orchestrate"): seed is ["orchestrate"] as before.
      This expansion is transparent — `target` in the response is always the original
      queried name. No schema change; pure read-time bridging.
    input:
      target:
        type: string
        required: false
        description: Symbol name to analyze (e.g. "upsert_file", "UserService.validate")
        min_length: 1
        max_length: 200
      uid:
        type: string
        required: false
        nullable: true
        default: null
        description: |
          P6c. A stable handle (from a seam_search/seam_query result `uid` field) that pins
          the exact symbol and skips homonym re-disambiguation — an alternative to `target`.
          The impact graph is name-keyed, so the uid is resolved to its symbol NAME before
          analysis. An unknown/stale uid returns the standard found=false result (not an error).
      direction:
        type: string
        required: false
        default: "upstream"
        enum: [upstream, downstream, both]
        description: |
          upstream   = who depends on the target (callers/importers)
          downstream = what the target depends on (callees/importees)
          both       = full neighborhood (upstream + downstream)
      max_depth:
        type: integer
        required: false
        default: 3
        min: 1
        max: 10
        description: Maximum number of hops from the target. Clamped to [1, 10].
      include_tests:
        type: boolean
        required: false
        default: false
        description: |
          When false (DEFAULT — changed in P1), dependents whose file lives in a test tree
          are filtered out from ALL tiers (WILL_BREAK / LIKELY_AFFECTED / MAY_NEED_TESTING),
          so "what breaks?" answers with the PRODUCTION blast radius. This also catches
          test-file import sources that arrive as file=null entries named after a test
          file's stem (test files importing the target directly). The response carries
          hidden_tests (int) so callers can distinguish "no dependents at all" from
          "all dependents were test files and got filtered" — the latter is NOT safe to
          treat as dead code.
          When true, test-file dependents are included too, each tagged with is_test=true
          (the pre-P1 behavior). To get the impacted TEST files specifically, use
          seam_affected instead. NOTE: the analysis-layer impact() default stays True;
          only the seam_impact tool/handler/CLI default flipped to false.
      max_bytes:
        type: integer
        required: false
        default: 0
        description: |
          E1-FULL. Opt-in hard byte ceiling for the serialized response body (characters
          of compact JSON). Default: SEAM_IMPACT_MAX_BYTES (0 = unlimited = byte-identical
          to pre-feature). When > 0, entries are trimmed from the LEAST-VALUABLE end
          (downstream before upstream; MAY_NEED_TESTING before WILL_BREAK; intra-tier
          tail before front) after the per-tier count cap and E2/E3 relevance ordering,
          until the serialized response fits the budget. Dropped counts are merged into
          `truncated` additively; `byte_capped` is added to the response when the ceiling
          fires. risk_summary always reflects the full pre-cap total. seam_changes and
          seam_affected are NEVER affected by this parameter.
    output:
      type: object
      description: |
        Top-level keys always present:
          found:   bool — True if the target is known in the index; False if not found
                          (typo / not yet indexed). Use this to distinguish "not found"
                          from "found but no dependents".
          target:  str  — the queried symbol name (echoed back for agent convenience).

        Direction-keyed TierGroups (keys depend on direction):
          "upstream"   -> {"upstream": TierGroup}
          "downstream" -> {"downstream": TierGroup}
          "both"       -> {"upstream": TierGroup, "downstream": TierGroup}

        TierGroup always contains all three tier keys even if empty:
          WILL_BREAK       (distance 1)  — direct dependents, definitely affected
          LIKELY_AFFECTED  (distance 2)  — indirect dependents, probably affected
          MAY_NEED_TESTING (distance 3+) — transitive dependents, test to be sure

        Each entry in a tier:
          name:        symbol name (string)
          distance:    hops from the target (integer, 1-based)
          confidence:  EXTRACTED | INFERRED | AMBIGUOUS
                       (aggregated path confidence — weakest hop wins)
                       Resolved at read time against the whole index:
                         EXTRACTED = target name is unique in the full index
                         AMBIGUOUS = target name shared by >1 indexed symbol
                         INFERRED  = target not indexed (external, stdlib, dynamic)
          tier:        risk tier name (string)
          file:        relative path from project root for indexed symbols;
                       null for names not in the symbols table (external deps, etc.)
          is_test:     bool — True if the entry's file is a test file (per path heuristic);
                       False for production files AND for entries with file=null
                       (unresolved names are never labelled as test, to avoid false positives).
          resolved_by: Phase 5. How the confidence tier was decided.
                       Stable string enum:
                         import         — promoted via a resolved same-file import (homonym fix)
                         name-unique    — target name appears exactly once in the full index
                         name-collision — target name shared by >1 indexed symbol
                         builtin        — known language builtin/stdlib (count==0 guard)
                         unresolved     — count==0, not a known builtin
                       null for pre-v6 indexes or when resolution context is unavailable.
                       Treat null as "unknown" — same null-contract as Phase 4 enrichment fields.
          best_candidate: Phase 5. For AMBIGUOUS entries (resolved_by: name-collision), the
                          file-path-proximate most-likely declaring file (relative path from
                          project root). null when resolved_by != name-collision, or when
                          proximity data is unavailable (no conn, no referencing-file context).
          kind:           E4. Edge kind of the final hop of the winning path to this dependent.
                          Full closed vocabulary:
                            call | import | extends | implements | instantiates | holds |
                            reads | writes | uses
                          Always present (empty string "" for degenerate/pre-E4 entries as
                          a defensive fallback). Kept in lean mode (verbose=false) — it is a
                          core field like 'confidence'. ABSENT entirely when
                          SEAM_EDGE_PROVENANCE=off (byte-identical pre-E4 output).
          synthesized_by: E4. Synthesis channel name when the final hop is a heuristic
                          synthesized edge (e.g. 'interface-override', 'closure-collection',
                          'event-emitter'), or null when the hop is statically extracted.
                          Null-contract: null = static (same pattern as resolved_by/best_candidate).
                          IMPORTANT: null is RETAINED in verbose mode (unlike null best_candidate
                          which is E1-omitted) — for synthesized_by, null is the common,
                          informative "static edge" value. Stripped in lean mode (verbose=false)
                          like resolved_by. ABSENT entirely when SEAM_EDGE_PROVENANCE=off.

        Present only when SEAM_IMPACT_STEER=on (default) AND >=1 entry was trimmed:
          next_actions:   list[str]. Ready-to-act prose hints naming the exact remedy for
                          each type of truncation that occurred, e.g.:
                            "Raise limit to 17 to see 12 more WILL_BREAK upstream dependents."
                            "Pass max_bytes=0 for the full untrimmed blast radius."
                          ABSENT when nothing was trimmed — presence is the unambiguous
                          "there is more" signal. When byte_capped dropped ALL entries,
                          always includes an explicit anti-false-safe line:
                          "Blast radius was trimmed to nothing — this is NOT 'no dependents'."
                          The steer stays within max_bytes (handler re-trims if needed).
                          Generated by seam/analysis/steer.py (pure leaf, never raises).

        Present only when include_tests=false:
          hidden_tests: int — count of test-file dependents that were filtered out across
                              all tiers. Distinguishes "no dependents" (hidden_tests==0)
                              from "all dependents were test files, all hidden" (hidden_tests>0).
                              The latter is NOT safe to treat as dead code — tests would break.

        Present only when max_bytes > 0 AND the ceiling trimmed >=1 entry:
          byte_capped: {limit: int, omitted: int}
                       limit   — the budget that was active (echoed from max_bytes param).
                       omitted — total entries dropped across all directions and tiers.
                       ABSENT when max_bytes=0 (unlimited) or everything fit within budget.
                       Dropped counts are also merged INTO `truncated` additively so the
                       invariant risk_summary[dir][tier] - shown == truncated[dir][tier]
                       holds end-to-end. Read `byte_capped.omitted` to isolate byte-drop
                       counts from count-cap drops (both accumulate in truncated).
                       IMPORTANT: an empty entry list + non-empty risk_summary means
                       "trimmed to nothing by byte ceiling", NOT "no dependents found".
                       Check byte_capped before concluding a symbol is safe to change.

        P2 staleness banner (present ONLY when SEAM_STALENESS_CHECK=on AND the index is stale):
          index_status: {stale: true, reason: str, hint: str}
                       ABSENT when fresh (presence is the unambiguous stale signal — same contract
                       as next_actions). Reason describes what is stale (e.g. "3 indexed file(s)
                       changed on disk since last index."). Hint is the remedy ("Run 'seam sync'…"
                       or "Run 'seam init' or 'seam sync'…" for synth-edge staleness). Risk verdicts
                       and all existing fields are byte-identical to pre-P2; the banner is additive
                       only. SEAM_STALENESS_CHECK=off = no stat IO, no banner, byte-identical.

        Unknown symbol: found=false, empty tier groups (not an error).
      empty_ok: true
      empty_message: "No dependents found for '{target}'"
    errors:
      - code: INVALID_INPUT
        condition: target is empty string or whitespace-only
      - code: INVALID_INPUT
        condition: direction is not one of upstream, downstream, both

  seam_trace:
    status: IMPLEMENTED
    description: |
      Trace the call/dependency path between two symbols.
      Returns the shortest path from source to target as an ordered list of hops,
      where each hop carries the edge kind (call | import | extends | implements |
      instantiates | holds | reads | writes | uses) and per-edge confidence
      (EXTRACTED | INFERRED | AMBIGUOUS).
      The extends/implements kinds are class-inheritance edges added in P6a
      (SEAM_INHERITANCE_EDGES=on). The instantiates kind was added in Tier B B6:
      'new Foo()' / struct-literal / composite-literal calls. The holds kind captures
      class composition: a class that stores another user-defined type as a typed
      field/property or constructor parameter. The reads and writes kinds (A3) capture
      field-access data-flow: reads = field read, writes = field write/delete. The uses
      kind captures method-param coupling: a function references a user type as a
      parameter. Tier B also enriches edge resolution: when a call's receiver type was
      inferred at index time, the target is already qualified ('Type.method') so it
      resolves with EXTRACTED confidence when unique — no Tier A bridging needed for
      that hop.

      E4 edge provenance: when SEAM_EDGE_PROVENANCE=on (default), each hop carries
      'synthesized_by' (synthesis channel name for heuristic edges, null for statically
      extracted edges). This lets callers tell a hard static call edge from a heuristic
      synthesized one on any hop in the path. Stripped in lean mode (verbose=false).
      SEAM_EDGE_PROVENANCE=off = byte-identical pre-E4 hop shape.

      Also returns one-hop callers and callees for both symbols so the agent can
      see the immediate neighborhood alongside the path.

      Use when you need to understand how control flows from one symbol to another,
      or to answer "how does X reach Y?" without manual grep.

      Returns found=false (paths=[]) when no path exists — a real, distinguishable
      "not connected" answer. Per-hop confidence lets you flag any hop that rests on
      an AMBIGUOUS edge (name collision at extraction time).
    input:
      source:
        type: string
        required: false
        description: Starting symbol name (e.g. "init", "parse_file")
        min_length: 1
        max_length: 200
      target:
        type: string
        required: false
        description: Destination symbol name (e.g. "upsert_file", "init_db")
        min_length: 1
        max_length: 200
      uid:
        type: string
        required: false
        nullable: true
        default: null
        description: |
          P6c. Stable handle (from a seam_search/seam_query `uid` field) pinning the exact
          SOURCE symbol — an alternative to `source`. Resolved to its symbol name (the path
          graph is name-keyed). An unknown/stale uid yields the standard found=false result.
      target_uid:
        type: string
        required: false
        nullable: true
        default: null
        description: |
          P6c. As `uid`, but pins the exact TARGET symbol (alternative to `target`).
      max_depth:
        type: integer
        required: false
        default: 10
        min: 1
        max: 10
        description: Maximum number of hops. Clamped to [1, 10].
    output:
      type: object
      description: |
        Top-level keys always present:
          found       (bool)  — True if a path was found; False if source and target
                                are not connected within max_depth hops.
          source      (str)   — queried source name (echoed back).
          target      (str)   — queried target name (echoed back).
          paths       (list)  — list of paths; each path is list[Hop].
                                Empty list ([]) when not connected.
          callers_source (list) — one-hop callers of source (list[EdgeHop]).
          callees_source (list) — one-hop callees of source (list[EdgeHop]).
          callers_target (list) — one-hop callers of target (list[EdgeHop]).
          callees_target (list) — one-hop callees of target (list[EdgeHop]).

        Hop shape (per edge in a path):
          from_name      (str)      — source of this edge
          to_name        (str)      — target of this edge
          kind           (str)      — full closed vocabulary:
                                        call | import | extends | implements | instantiates |
                                        holds | reads | writes | uses
                                      'reads' and 'writes' are A3 field-access edge kinds;
                                      'uses' captures method-param coupling (E4 vocab correction)
          confidence     (str)      — EXTRACTED | INFERRED | AMBIGUOUS
                                      Resolved at read time against the whole index
                                      (EXTRACTED = to_name unique in index; AMBIGUOUS = shared name;
                                       INFERRED = to_name not indexed)
          resolved_by    (str|null) — Phase 5. Provenance of this hop's confidence.
                                      Stable enum: import | name-unique | name-collision |
                                                   builtin | unresolved
                                      null for pre-v6 indexes or missing resolution context.
          best_candidate (str|null) — Phase 5. For AMBIGUOUS hops (resolved_by: name-collision),
                                      the most file-path-proximate declaring file (relative path).
                                      null when resolved_by != name-collision or no proximity data.
          synthesized_by (str|null) — E4. Synthesis channel name when this hop is a heuristic
                                      synthesized edge (e.g. 'interface-override',
                                      'closure-collection', 'event-emitter'). null when the hop
                                      is statically extracted. Same null-contract as resolved_by.
                                      Stripped in lean mode (verbose=false). ABSENT when
                                      SEAM_EDGE_PROVENANCE=off.

        EdgeHop shape (for callers_* / callees_* lists):
          name           (str)      — neighboring symbol name
          kind           (str)      — full closed vocabulary (same as Hop.kind above)
          confidence     (str)      — EXTRACTED | INFERRED | AMBIGUOUS
          resolved_by    (str|null) — Phase 5. Same provenance vocabulary as Hop above.
                                      null for pre-v6 indexes or missing context.
          best_candidate (str|null) — Phase 5. Same semantics as Hop above.
          synthesized_by (str|null) — E4. Same semantics as Hop.synthesized_by above.
                                      ABSENT when SEAM_EDGE_PROVENANCE=off.

        Special case: source == target → found=true, paths=[[]] (empty inner path,
        zero hops, trivially connected to itself).

        P2 staleness banner (present ONLY when SEAM_STALENESS_CHECK=on AND the index is stale):
          index_status: {stale: true, reason: str, hint: str}
                       Same contract as seam_impact.index_status. Additive only — path and
                       neighborhood fields are byte-identical to pre-P2.
      empty_ok: true
      empty_message: "No path found from '{source}' to '{target}'"
    errors:
      - code: INVALID_INPUT
        condition: source is empty string or whitespace-only
      - code: INVALID_INPUT
        condition: target is empty string or whitespace-only

  seam_changes:
    status: IMPLEMENTED
    description: |
      Pre-commit risk check — map git diff to affected symbols and produce an overall
      risk level. Diffs the working tree / staged set / branch against a git ref,
      maps each changed line range to the symbols it touched, runs impact analysis,
      and returns a risk level (low / medium / high / critical).
      Returns NOT_A_GIT_REPO when run outside a git repository.
    input:
      scope:
        type: string
        required: false
        default: "working"
        enum: [working, staged, branch]
        description: |
          working — unstaged working-tree changes (git diff)
          staged  — staged changes (git diff --cached)
          branch  — all changes on this branch vs base_ref (git diff <base_ref>...HEAD)
      base_ref:
        type: string
        required: false
        default: "main"
        description: |
          Git ref for scope=branch comparisons (e.g. "main", "origin/main", "v1.2").
          Ignored for scope=working and scope=staged.
    output:
      type: object
      fields:
        changed_symbols:
          type: array
          description: Symbols whose line ranges overlap changed lines.
          items:
            name:          symbol name (or "<module:file.py>" for module-level changes)
            file:          relative path from project root (or null)
            kind:          symbol kind (function | class | method | module | ...)
            start_line:    symbol definition start (0 for module-level synthetic entries)
            end_line:      symbol definition end (0 for module-level synthetic entries)
            changed_lines: list of new-file line numbers overlapping this symbol
        new_files:
          type: array
          items: string
          description: Relative paths of added or untracked files.
        affected:
          type: array
          description: Upstream dependents of changed symbols (from impact analysis).
          items:
            name:       symbol name
            file:       relative path from project root (null if not indexed)
            tier:       WILL_BREAK | LIKELY_AFFECTED | MAY_NEED_TESTING
            confidence: EXTRACTED | INFERRED | AMBIGUOUS
                        Resolved at read time against the whole index.
                        EXTRACTED = target unique; AMBIGUOUS = shared name; INFERRED = not indexed.
            distance:   hops from the nearest changed symbol
        risk_level:
          type: string
          enum: [low, medium, high, critical]
          description: |
            Rollup of the highest impact tier across all changed symbols:
              low      — no downstream dependents found
              medium   — MAY_NEED_TESTING (transitive dependents, d>=3)
              high     — LIKELY_AFFECTED (indirect dependents, d=2)
              critical — WILL_BREAK (direct dependents, d=1)
            Attenuated to "medium" when ALL affected symbols have AMBIGUOUS confidence
            (uncertain inputs cap the verdict confidence — see ChangeReport in CONTRACT.md).
        ambiguous_warning:
          type: boolean
          description: |
            True when ANY affected symbol has AMBIGUOUS edge confidence.
            Signals the risk estimate is uncertain; recommend manual review.
        partial:
          type: boolean
          description: |
            True when the number of real changed symbols (excluding synthetic <module:...>
            and <new:...> entries) exceeded the SEAM_MAX_IMPACT_SYMBOLS cap (default 50),
            so the risk verdict was computed on only the first N changed symbols.
            False on normal-sized diffs where all changed symbols were analyzed.
            When true, treat the risk_level as a lower bound — the full blast radius may
            be larger. The cap can be raised via the SEAM_MAX_IMPACT_SYMBOLS env var.
        scope:    the scope used (echoed back for agent convenience)
        base_ref: the base ref used (echoed back; only meaningful for scope=branch)

        P2 staleness banner (present ONLY when SEAM_STALENESS_CHECK=on AND the index is stale):
          index_status: {stale: true, reason: str, hint: str}
                       Same contract as seam_impact.index_status. IMPORTANT: risk_level and all
                       change-risk verdict fields are byte-stable regardless of this banner — the
                       analysis layer (changes.py) is called directly below the handler and is
                       unaffected by SEAM_STALENESS_CHECK.
      empty_ok: true
      empty_message: "No changes detected for scope '{scope}'"
    errors:
      - code: INVALID_INPUT
        condition: scope is not one of working, staged, branch
      - code: INVALID_INPUT
        condition: base_ref is empty string or whitespace-only
      - code: NOT_A_GIT_REPO
        condition: root is not a git repository or git is not available

  seam_clusters:
    status: IMPLEMENTED
    phase: 2
    description: |
      List all code clusters (functional areas) or the members of one cluster.

      Clusters are computed during `seam init` using Louvain community detection over
      the call/import graph. Each cluster represents a cohesive group of symbols that
      frequently call or import each other.

      With no argument: returns [{id, label, size}] — an overview of all detected
      functional areas sorted by id.

      With cluster_id: returns [{name, file, line, kind}] — all symbols in that
      cluster, with file paths relativized to the project root.

      Returns an empty list (not an error) when the index has no cluster data —
      either no symbols are indexed, `seam init` has not been run since Phase 2
      migration, or all communities fell below SEAM_CLUSTER_MIN_SIZE.
    input:
      cluster_id:
        type: integer
        required: false
        nullable: true
        default: null
        description: |
          When omitted (or null): list all clusters as [{id, label, size}].
          When provided: list member symbols of that cluster as [{name, file, line, kind}].
    output:
      type: array
      description: |
        No cluster_id → list of cluster summaries:
          id:     (int)    — stable cluster identifier (1-based, deterministic across re-index)
          label:  (str)    — human-readable label (deterministic or LLM-generated)
          size:   (int)    — number of member symbol ROWS (may exceed unique names due to
                             cross-file homonym collapse — see ADR-007)

        With cluster_id → list of member symbols:
          name:   (str)    — symbol name
          file:   (str)    — path relative to project root
          line:   (int)    — start line of the symbol definition
          kind:   (str)    — function | class | method | interface | type
      empty_ok: true
      empty_message: "No clusters found — run 'seam init' to compute clusters"
    errors: []

  seam_affected:
    status: IMPLEMENTED
    phase: 3
    description: |
      Find which test files are impacted by a set of changed source files.

      Given a list of changed file paths, traverses the reverse-dependency graph
      (upstream impact) to find all test files that depend on symbols in those files.
      Reuses the same traversal engine as seam_impact(direction="upstream") — no
      duplicate blast-radius logic.

      A changed file that is itself a test file is always included in affected_tests
      directly (you edited the test, you should run it).
      Files not in the index are silently skipped — they have no graph dependents.

      Typical agent workflow:
        1. git diff --name-only             → list of changed files
        2. seam_affected(changed_files)     → impacted test files
        3. pytest <affected_tests>          → run only what matters

      Returns INVALID_INPUT when changed_files is empty or exceeds SEAM_MAX_AFFECTED_FILES.
    input:
      changed_files:
        type: array
        items: string
        required: true
        description: |
          List of file paths (absolute, or relative to the project root).
          Must not be empty. Maximum length: SEAM_MAX_AFFECTED_FILES (default 200).
          Paths not present in the index are silently skipped (no error).
      depth:
        type: integer
        required: false
        default: 5
        description: |
          Maximum upstream traversal depth (hops) from each changed symbol.
          Default: SEAM_AFFECTED_DEPTH env var (default 5).
          Higher values find more distant test dependents but increase runtime on
          large graphs. depth=0 returns only directly-changed test files (no traversal).
    output:
      type: object
      description: |
        changed_files:
          (list[str]) — relativized paths of the input changed files (relative to project root).
        affected_tests:
          (list[str]) — sorted unique test-file paths (relative to project root) that must be
                        re-run. Empty list when no test dependents are found.
        total_dependents_traversed:
          (int) — total number of dependent entries examined across all symbols in all changed
                  files. Informational; may double-count when the same dependent is reachable
                  from multiple changed symbols.
        partial:
          (bool) — True when the per-file symbol cap (SEAM_MAX_AFFECTED_SYMBOLS, default 50)
                   was hit for at least one file. When true, the affected set may be incomplete.
                   Raise SEAM_MAX_AFFECTED_SYMBOLS via env var to analyze more symbols per file.

        P2 staleness banner (present ONLY when SEAM_STALENESS_CHECK=on AND the index is stale):
          index_status: {stale: true, reason: str, hint: str}
                       Same contract as seam_impact.index_status. IMPORTANT: affected_tests and
                       all impacted-test-file fields are byte-stable — analysis layer is called
                       directly below the handler and is unaffected by SEAM_STALENESS_CHECK.
      empty_ok: true
      empty_message: "No affected test files found for the given changed files"
    errors:
      - code: INVALID_INPUT
        condition: changed_files is empty
      - code: INVALID_INPUT
        condition: len(changed_files) exceeds SEAM_MAX_AFFECTED_FILES (default 200)

  seam_why:
    status: IMPLEMENTED
    phase: 1b
    description: |
      Return semantic comments (WHY/HACK/NOTE/TODO/FIXME) near a file location or a symbol.
      Comments are extracted at index time from Python # line comments and TypeScript //
      and /* */ block comments. Only marker-tagged comments are stored — plain comments
      are ignored, so an empty result genuinely means "no recorded rationale here."

      Lookup modes (at least one of file or symbol is required):
        file only     — all semantic comments in that file.
        file + line   — comments within ±15 lines of that line number (RADIUS=15).
        symbol        — comments in [start_line - 5, end_line] of the resolved symbol
                        (LEAD=5 captures pre-symbol rationale comments just above the def).

      Marker set (fixed; matched case-insensitively, optional trailing colon):
        WHY, HACK, NOTE, TODO, FIXME
      Matching rule: marker must be followed by ':', whitespace, or end-of-string so
      partial words like 'whyever' or 'notes' do NOT produce a false match.
      Stored marker is normalized to UPPERCASE.
    input:
      file:
        type: string
        required: false
        description: |
          File path (relative to project root or absolute). At least one of
          file or symbol must be supplied — omitting both is INVALID_INPUT.
      line:
        type: integer
        required: false
        description: |
          1-based line number. Only meaningful when file is also provided.
          When supplied, returns comments within ±RADIUS (15) lines of this line.
          Ignored when symbol is given (symbol mode uses the symbol's own line range).
      symbol:
        type: string
        required: false
        description: |
          Symbol name to look up (e.g. "my_func", "UserService.validate"). When
          multiple symbols share the name, the first by (file path, symbol id) is used —
          deterministic, matching seam_context behaviour. At least one of file or
          symbol must be supplied.
    output:
      type: array
      items:
        file:
          type: string
          description: Relative path from project root (consistent with other tools).
        line:
          type: integer
          description: 1-based line number of the comment in the source file.
        marker:
          type: string
          enum: [WHY, HACK, NOTE, TODO, FIXME]
          description: Normalized UPPERCASE marker keyword.
        text:
          type: string
          description: Comment body after the marker (and optional colon), stripped.
      empty_ok: true
      empty_message: "No semantic comments found for the given location or symbol."
    errors:
      - code: INVALID_INPUT
        condition: neither file nor symbol is provided

  seam_context_pack:
    status: IMPLEMENTED
    phase: 6
    description: |
      Get a ready-to-paste context bundle for a symbol in ONE call: the target's full
      360° view PLUS its direct callers/callees already ENRICHED (signature, file, line,
      kind — not just names), the WHY/HACK/NOTE comments that explain it, and its
      functional-area peers. Use this instead of chaining seam_context + seam_why +
      repeated seam_context lookups on each neighbor.

      Pure read-time orchestration over existing primitives (engine.context, comments.why,
      the name-keyed edge graph) — no new extraction, no schema change. 1-hop only:
      neighbors-of-neighbors are out of scope.

      Homonym mitigation: enriched neighbors are capped per source file
      (SEAM_PACK_PER_FILE_CAP, default 3) so one file's same-named symbols cannot flood
      the bundle, then globally capped (SEAM_PACK_NEIGHBOR_LIMIT, default 10 per list).
      Comments are capped at SEAM_PACK_MAX_COMMENTS (default 10). The `truncated` counts
      report how many entries each cap dropped so the agent knows the bundle is partial
      and can fall back to seam_impact for the full blast radius. Neighbor names that have
      no symbol row in the index (external/unindexed) are silently skipped and do NOT
      count toward `truncated`.
    input:
      symbol:
        type: string
        required: true
        description: Exact symbol name (e.g. "context_pack", "UserService.validate")
        min_length: 1
        max_length: 200
    output:
      type: object
      nullable: true
      null_message: "Symbol '{symbol}' not found in index"
      fields:
        target:
          type: object
          description: |
            The full seam_context payload for the symbol (all fields documented under
            seam_context: symbol/file/line/end_line/kind/docstring/callers/callees/
            ambiguous/cluster_id/cluster_label/cluster_peers + the Phase 4 enrichment
            fields). File path relativized to project root.
        callers:
          type: array
          description: |
            Direct 1-hop callers, enriched and capped. Ordered by lowest symbol id within
            each file (deterministic). Per-file capped then globally capped.
          items:
            name:
              type: string
            file:
              type: string
              description: Relative path from project root
            line:
              type: integer
            kind:
              type: string
              enum: [function, class, method, interface, type]
            signature:
              type: string
              nullable: true
              description: Phase 4 signature; null for pre-v5 rows or unextracted headers.
            decorators:
              type: array
              items: string
            is_exported:
              type: boolean
              nullable: true
            visibility:
              type: string
              nullable: true
            qualified_name:
              type: string
              nullable: true
        callees:
          type: array
          description: Direct 1-hop callees, enriched and capped (same item shape as callers).
          items: "see callers.items"
        why:
          type: array
          description: |
            WHY/HACK/NOTE/TODO/FIXME comments attached to the symbol (same item shape as
            seam_why output), capped at SEAM_PACK_MAX_COMMENTS.
          items:
            file:
              type: string
            line:
              type: integer
            marker:
              type: string
              enum: [WHY, HACK, NOTE, TODO, FIXME]
            text:
              type: string
        cluster_peers:
          type: array
          items: string
          description: Functional-area peers from the target (same as seam_context.cluster_peers).
        truncated:
          type: object
          description: |
            Counts of entries dropped BY CAPS (not by being unindexed) in each list, so the
            caller knows the bundle is partial.
          fields:
            callers:
              type: integer
            callees:
              type: integer
            comments:
              type: integer
    errors:
      - code: INVALID_INPUT
        condition: symbol is empty string or whitespace-only

  seam_flows:
    status: IMPLEMENTED
    phase: flows
    description: |
      Discover execution flows — how the program runs, end to end. Purely structural
      (no LLM, no embeddings): derived from the call graph at read time.

      With no argument: returns {"entry_points": [{name, kind, file, reach}]} — the
      codebase's top execution starting points, defined as call-graph ROOTS (symbols
      with no incoming call edge), excluding tests. On a real repo these are the CLI
      commands, web routes, MCP handlers, and main().

      Ranking (P6b): entries are ranked by framework-aware WEIGHTED reach
      (entry_score * reach), not raw reach, so a route/view/controller with a shallow
      downstream reach can outrank a deep internal utility. entry_score is a small
      multiplier (>=1.0; 1.0 = neutral baseline) computed at index time from the
      file path pattern (views.py, routes/, controllers/, cmd/, …) and the symbol's
      decorator text (@app.route, @router.get, @GetMapping, …). The `reach` field
      still reports the RAW transitive call count — entry_score is a ranking signal
      only. Set SEAM_ENTRY_SCORE=off to revert to raw-reach ranking (pre-P6b).

      With an entry name: returns that entry point's flow tree — a forward expansion
      over call/import edges, depth-capped (SEAM_FLOW_MAX_DEPTH) and breadth-capped
      (SEAM_FLOW_MAX_BREADTH), cycle-safe (each symbol appears once, first reach wins).

      Per-step confidence uses the fast name-count resolver, NOT Phase-5 import
      promotion — a flow is an overview; use seam_impact / seam_trace for promoted,
      import-aware confidence.
    input:
      entry:
        type: string
        required: false
        nullable: true
        default: null
        description: |
          When omitted (or null): list entry points.
          When provided: expand that entry point's flow tree.
    output:
      type: object
      description: |
        No entry → {"entry_points": [{name, kind, file (relativized), reach}]}.

        With entry → a Flow object:
          entry:       (str)  — the entry point name
          kind:        (str)  — symbol kind, or null if undefined in the index
          file:        (str)  — declaring file relativized to root, or null
          steps:       (array)— nested [{name, kind, file, line, confidence, children,
                                truncated}] following the call chain forward
          total_steps: (int)  — number of FlowStep nodes in the tree
          truncated:   (bool) — True if depth/breadth caps cut part of the tree
      found_false_ok: true
      found_false_message: "Unknown entry → {\"found\": false} (MCP boundary normalization)"
    errors:
      - code: INVALID_INPUT
        condition: entry is provided but empty/whitespace-only

  seam_structure:
    status: IMPLEMENTED
    phase: tier-d11
    description: |
      Whole-repository directory/file/container structure tree — Slice 1 (Tier D11).

      Returns a nested tree of the repository's structural skeleton derived from the index.
      No arguments. Pure-read — no schema change, no new config knobs.

      Tree node kinds:
        dir       — a directory in the repository hierarchy
        file      — an indexed source file (carries symbol_count and child containers/functions)
        container — a class/interface/type symbol within a file (path=null)
        function  — a top-level function within a file (path=null)

      Method/member symbols (kind='method' or qualified name containing '.') are rolled up
      into their owning container's `members` count and do NOT appear as separate nodes —
      this keeps the tree compact and focused on the structural skeleton.

      Each node carries:
        kind:         'dir' | 'file' | 'container' | 'function'
        name:         display name (directory basename, filename, or symbol name)
        path:         repo-root-relative path string; null for container and function nodes
        symbol_count: total symbol DB rows in this subtree (file: all rows; dir: sum of children)
        area:         functional-area cluster label (Slice 1: always null)
        children:     child nodes (list of StructureNode)
        members:      count of rolled-up method/member rows (0 for non-container kinds)

      Slice 1 invariants (area=null, truncated=0, no caps):
        - area is null on every node (populated in a future slice).
        - truncated is always 0 (no per-directory or per-file caps applied).

      Use this to get a structural overview before diving into a specific file or symbol,
      or to understand how files and containers are organized across the repository.
    input: {}
    output:
      type: object
      description: |
        tree:
          (StructureNode) — root dir node representing the project root. Nested:
            kind:         (str)  — 'dir' | 'file' | 'container' | 'function'
            name:         (str)  — display name
            path:         (str | null) — repo-root-relative path; null for containers/functions
            symbol_count: (int)  — total symbol rows in this subtree
            area:         (null) — always null in Slice 1
            children:     (list) — child StructureNodes
            members:      (int)  — rolled-up method count (0 for non-container nodes)
        truncated:
          (int) — count of omitted nodes (always 0 in Slice 1)
      found_false_ok: false
    errors: []
