name: Explorer Visual QA

on:
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - "seam/server/**"
      - "seam/query/layout.py"
      - "seam/cli/serve.py"
      - ".github/workflows/explorer-visual.yml"
  workflow_dispatch:

concurrency:
  group: explorer-visual-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  topology:
    name: topology browser invariant
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3  # v8.3.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --extra web --dev --python 3.12

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Install Chromium
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Run topology visual QA
        run: npm run test:visual
        working-directory: web

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: explorer-visual-report
          path: |
            web/playwright-report/
            web/test-results/topology-visual/
