name: Explorer Visual QA

on:
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - "seam/server/**"
      - "seam/query/layout.py"
      - "seam/cli/serve.py"
      - ".github/workflows/explorer-visual.yml"
  workflow_dispatch:

concurrency:
  group: explorer-visual-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  topology:
    name: topology browser invariant
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --extra web --dev --python 3.12

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Install Chromium
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Run topology visual QA
        run: npm run test:visual
        working-directory: web

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: explorer-visual-report
          path: |
            web/playwright-report/
            web/test-results/topology-visual/
